spring.application.name=GestorPedidos
server.port=8085

# Conexión con la base de datos de Laragon
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/agrotech_db_gestor_pedidos
spring.datasource.username=root
spring.datasource.password=

# Modo de trabajo para JPA
spring.jpa.hibernate.ddl-auto=update

# Logs de SQL estructurados
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto genérico de MySQL (Evita fallas en Hibernate 6+)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuración de Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v1/api-docs

# Comunicación entre Microservicios (Red interna de Docker)
equipo-service.url=http://ms_gestor_inventario:8083/api/v1/equipos
usuario-service.url=http://ms_gestion_usuario:8081/api/v1/usuarios
usuario-conectado-service.url=http://ms_autenticacion_nuevo:8082
pagoyfactura.base-url=http://ms_pago_factura:8087/api/v1/facturas

# Clave secreta para el JWT
