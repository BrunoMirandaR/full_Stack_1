spring.application.name=GestorInventario
server.port=8083

# Conexión con la base de datos de Laragon
spring.datasource.url=jdbc:mysql://172.29.64.1:3306/agrotech_db_gestor_inventario
spring.datasource.username=root
spring.datasource.password=

# Modo de trabajo para JPA
spring.jpa.hibernate.ddl-auto=update

# Logs de SQL estructurados
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto genérico de MySQL (Evita fallas en Hibernate 6+)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuración de Swagger / OpenAPI
springdoc.api-docs.path=/v1/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Comunicación entre Microservicios (Red interna de Docker)
usuario-service.url=http://ms_gestion_usuario:8081/api/v1/usuarios
usuario-conectado-service.url=http://ms_autenticacion_nuevo:8082
marca-service.url=http://ms_gestor_marca_modelo:8086/api/v1/marcas
modelo-service.url=http://ms_gestor_marca_modelo:8086/api/v1/modelos