spring.application.name=Autentication
server.port=8082

# Conexión con la base de datos de Laragon
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/agrotech_db_autenticacion
spring.datasource.username=root
spring.datasource.password=

# Modo de trabajo para JPA
spring.jpa.hibernate.ddl-auto=update

# Dialecto genérico de MySQL (Evita fallas en Hibernate 6+)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuración limpia de Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html