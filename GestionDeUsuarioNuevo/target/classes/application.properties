spring.application.name=GestionUsuarios
server.port=8081

# Conexión con la base de datos de Laragon
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/agrotech_db_gestion_usuarios
spring.datasource.username=root
spring.datasource.password=

# Modo de trabajo para JPA
spring.jpa.hibernate.ddl-auto=update

# Dialecto genérico de MySQL (Evita fallas en Hibernate 6+)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuración limpia de Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Comunicación entre Microservicios (Red interna de Docker)
rol-service.url=http://ms_roles_permisos:8089/api/v1/roles