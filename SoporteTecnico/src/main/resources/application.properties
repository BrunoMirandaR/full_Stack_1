spring.application.name=SoporteTecnico
server.port=8084

# Conexión con la base de datos de Laragon
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/agrotech_db_soporte_tecnico
spring.datasource.username=root
spring.datasource.password=

# Modo de trabajo para JPA
spring.jpa.hibernate.ddl-auto=update

# Logs de SQL estructurados
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto genérico de MySQL (Evita fallas en Hibernate 6+)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Comunicación entre Microservicios (Red interna de Docker)
usuario-service.url=http://ms_gestion_usuario:8081/api/v1/usuarios
usuario-conectado-service.url=http://ms_autenticacion_nuevo:8082

# Configuración limpia de Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html