spring.application.name=RolesyPermisos
server.port=8089

# Conexión con la base de datos de Laragon (Usando el puente al host de Windows)
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/agrotech_db_roles_permisos
spring.datasource.username=root
spring.datasource.password=

# Modo de trabajo para JPA
spring.jpa.hibernate.ddl-auto=update

# Logs de SQL estructurados
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto genérico de MySQL (Evita fallas en Spring Boot 3 / Hibernate 6+)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuración limpia de Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v1/api-docs

# Comunicación entre Microservicios (Apuntando a los contenedores de la red de Docker)
usuario-service.url=http://ms_gestion_usuario:8081/api/v1/usuarios
usuario-conectado-service.url=http://ms_autenticacion_nuevo:8082